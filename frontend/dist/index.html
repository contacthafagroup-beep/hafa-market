<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hafa Market — Africa's premier agricultural marketplace. Fresh vegetables, fruits, grains, coffee and more delivered to your door." />
    <meta name="theme-color" content="#2E7D32" />
    <link rel="manifest" href="/manifest.json" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <title>Hafa Market – Farm Fresh Delivered</title>
    <!-- Telegram WebApp SDK — required for Mini App functionality -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" crossorigin src="/assets/index-u439Ofdp.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BE9qB25h.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {})
        })
      }

      // PWA install prompt — show after 30s
      let deferredPrompt = null
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault()
        deferredPrompt = e
        setTimeout(() => {
          if (!deferredPrompt) return
          const banner = document.createElement('div')
          banner.id = 'pwa-banner'
          banner.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2E7D32;color:#fff;padding:12px 20px;border-radius:16px;font-family:Poppins,sans-serif;font-size:14px;font-weight:600;display:flex;align-items:center;gap:12px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);max-width:340px;width:90%'
          banner.innerHTML = '<span>📲 Install Hafa Market app</span><button onclick="installPWA()" style="background:#fff;color:#2E7D32;border:none;padding:6px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px">Install</button><button onclick="document.getElementById(\'pwa-banner\').remove()" style="background:transparent;border:none;color:#fff;cursor:pointer;font-size:18px;line-height:1">×</button>'
          document.body.appendChild(banner)
        }, 30000)
      })

      window.installPWA = async () => {
        if (!deferredPrompt) return
        deferredPrompt.prompt()
        const { outcome } = await deferredPrompt.userChoice
        deferredPrompt = null
        const banner = document.getElementById('pwa-banner')
        if (banner) banner.remove()
      }
    </script>
  </body>
</html>
